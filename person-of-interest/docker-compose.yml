services:
  # ── POI Backend ────────────────────────────────────────
  poi-backend:
    image: ${POI_BACKEND_IMAGE:-intel/poi-backend:2026.1.0-rc2}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: poi-backend
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - REDIS_HOST=redis
      - PYTHONPATH=/app
      - ALERT_SERVICE_URL=http://poi-alert-service:8000
      - DELIVERY_HANDLERS=log,alert_service
      # ALERT_DEDUP_TTL, OBJECT_CACHE_TTL, SIMILARITY_THRESHOLD,
      # SEARCH_SIMILARITY_THRESHOLD are injected via env_file (.env below).
      # Do NOT override them here — environment: takes precedence over env_file
      # and would prevent .env edits from taking effect.
      - RTSP_BASE_URL=rtsp://mediaserver:8554
      - RTSP_PREWARM_CAMERAS=Camera_01,Camera_02
      - CAMERA_STREAM_MAP=${CAMERA_STREAM_MAP:-Camera_01:Camera_01,Camera_02:Camera_02}
      - MQTT_IMAGE_CAMERAS=Camera_01,Camera_02
      - ENROLL_FACE_PADDING=0.0
      - ENROLL_FACE_SQUARE=false
      - ENROLL_EMBEDDING_STRATEGY=mean
      - MEDIAMTX_WEBRTC_PORT=${MEDIAMTX_WEBRTC_PORT:-8889}
      - USECASE_1=${USECASE_1:-Person-of-Interest}
      - CONTAINER_RESULTS_PATH=/app/results
      - SCENESCAPE_API_URL=${POI_BACKEND_SCENESCAPE_URL:-https://web.scenescape.intel.com}
      - SCENESCAPE_API_USER=${SCENESCAPE_API_USER:-}
      - SCENESCAPE_API_PASSWORD=${SCENESCAPE_API_PASSWORD:-}
      - NO_PROXY=localhost,127.0.0.1,web.scenescape.intel.com,*.intel.com,172.18.0.0/16,172.19.0.0/16,10.*,134.*
      - no_proxy=localhost,127.0.0.1,web.scenescape.intel.com,*.intel.com,172.18.0.0/16,172.19.0.0/16,10.*,134.*
    volumes:
      - ./data/faiss:/data/faiss
      - ./data/uploads:/data/uploads
      - ./models/intel/intel:/models/intel:ro
      - ./results:/app/results
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - poi-net
      - storewide-lp

  # ── UI ─────────────────────────────────────────────────
  ui:
    image: ${POI_UI_IMAGE:-intel/poi-ui:2026.1.0-rc2}
    build:
      context: .
      dockerfile: ui/Dockerfile
    container_name: poi-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - poi-backend
    networks:
      - poi-net

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:8.6.2
    container_name: poi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - poi-net

  # ── Alert Service ──────────────────────────────────────
  poi-alert-service:
    image: intel/alert-service:0.0.1
    container_name: poi-alert-service
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - MQTT_HOST=${MQTT_HOST:-localhost}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - DELIVERY_HANDLERS=log,websocket
    volumes:
      - ./configs/alert-service-config.yaml:/app/config/config.yaml:ro
      - ./configs/alert-service-overrides/ws_manager.py:/app/src/delivery/ws_manager.py:ro
      - ./configs/alert-service-overrides/alerts.py:/app/src/api/endpoints/alerts.py:ro
    networks:
      - poi-net
      - storewide-lp

  # ── Metrics Collector (benchmark profile only) ──────────
  metrics-collector:
    image: ${REGISTRY_BENCHMARK:-intel/retail-benchmark:2026.0.0}
    container_name: poi-metrics-collector
    profiles:
      - benchmark
    privileged: true
    pid: host
    environment:
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - NO_PROXY=${NO_PROXY}
      - http_proxy=${HTTP_PROXY}
      - https_proxy=${HTTPS_PROXY}
      - no_proxy=${NO_PROXY}
      - NPU_LOG=/tmp/results/npu_usage.csv
      - METRICS_DIR=/tmp/results
    volumes:
      - ${RESULTS_PATH:-./results}:/tmp/results
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /sys/devices:/sys/devices
      - /dev/dri:/dev/dri:rw
      - /sys/class/drm:/sys/class/drm:ro
      - /sys/kernel/debug:/sys/kernel/debug:ro
    networks:
      - poi-net

volumes:
  redis-data:

networks:
  poi-net:
    driver: bridge
  storewide-lp:
    external: true
