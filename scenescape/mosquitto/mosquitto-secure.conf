allow_anonymous true

# Plain MQTT listener for internal Docker network (DLStreamer, controller)
listener 1883

# TLS MQTT listener
listener 8883
keyfile /mosquitto/secrets/certs/scenescape-broker.key
certfile /mosquitto/secrets/certs/scenescape-broker.crt
tls_version tlsv1.3

listener 1884
cafile /mosquitto/secrets/certs/scenescape-ca.pem
keyfile /mosquitto/secrets/certs/scenescape-broker.key
certfile /mosquitto/secrets/certs/scenescape-broker.crt
protocol websockets

# Plain WebSocket listener (no TLS) for browser-based MQTT clients
listener 9001
protocol websockets
