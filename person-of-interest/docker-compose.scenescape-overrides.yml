# SceneScape controller patches (POI-specific)
# Layered on top of scenescape/docker-compose.yaml — not used standalone.
services:
  scene:
    volumes:
      - ../scenescape/controller/patches/moving_object.py:/usr/local/lib/python3.11/site-packages/controller/moving_object.py:ro
      - ../scenescape/controller/patches/vdms_adapter.py:/usr/local/lib/python3.11/site-packages/controller/vdms_adapter.py:ro

  # Fix WebRTC playback in Docker: MediaMTX must use a fixed UDP port for
  # ICE media (default is random ephemeral ports which Docker can't forward).
  # HOST_IP is auto-detected during 'make init' (written to docker/.env) so
  # MediaMTX advertises the host's real IP via webrtcAdditionalHosts, making
  # ICE candidates reachable by the browser.
  mediaserver:
    ports:
      - "8189:8189/udp"
      - "8189:8189/tcp"
    environment:
      - MTX_WEBRTCLOCALUDPADDRESS=:8189
      - MTX_WEBRTCLOCALTCPADDRESS=:8189
      - MTX_WEBRTCADDITIONALHOSTS=${HOST_IP:-127.0.0.1}

  # Re-encode to baseline H264 (no B-frames) so WebRTC playback works
  lp-cams:
    command: >
      -nostdin -re -stream_loop -1 -i /workspace/media/${VIDEO_FILE:-Camera_01.mp4}
      -c:v libx264 -profile:v baseline -preset ultrafast -tune zerolatency -b:v 2M -an
      -f rtsp -rtsp_transport tcp rtsp://mediaserver:8554/${CAMERA_NAME:-Camera_01}

  lp-cams-2:
    command: >
      -nostdin -re -stream_loop -1 -i /workspace/media/${VIDEO_FILE_2:-Camera_02.mp4}
      -c:v libx264 -profile:v baseline -preset ultrafast -tune zerolatency -b:v 2M -an
      -f rtsp -rtsp_transport tcp rtsp://mediaserver:8554/${CAMERA_NAME_2:-Camera_02}
