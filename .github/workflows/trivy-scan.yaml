name: trivy code scan
on:
  push:
    branches:
    - main
  pull_request:
permissions:
  contents: read

jobs:
  trivy_scan:
    permissions:
      contents: read  # for actions/checkout to fetch code
      security-events: write  # for github/codeql-action/upload-sarif to upload SARIF results
    name: trivy scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2

    - name: Generate pinned requirements for Trivy
      run: |
        pip install pip-tools
        cd suspicious-activity-detection
        pip-compile behavioral-analysis/requirements.txt -o behavioral-analysis/requirements-pinned.txt --quiet
        mv behavioral-analysis/requirements-pinned.txt behavioral-analysis/requirements.txt
        pip-compile swlp-service/pyproject.toml -o swlp-service/requirements-pinned.txt --quiet
        mv swlp-service/requirements-pinned.txt swlp-service/requirements.txt
        pip-compile rule-engine/pyproject.toml -o rule-engine/requirements-pinned.txt --quiet
        mv rule-engine/requirements-pinned.txt rule-engine/requirements.txt
    
    - name: Run Trivy vulnerability scanner in fs mode
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
      with:
        scan-type: 'fs'
        scan-ref: 'suspicious-activity-detection'
        scanners: 'vuln,secret'
        severity: 'CRITICAL,HIGH'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@1b549b9259bda1cb5ddde3b41741a82a2d15a841
      with:
        sarif_file: 'trivy-results.sarif'
