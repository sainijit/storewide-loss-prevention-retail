# Behavioral Analysis — Pattern Configuration
#
# Define activity patterns using declarative pose rules.
# No code changes required — add new patterns here and restart.
#
# See config/README.md for the full authoring guide.

# ── VLM Settings ──────────────────────────────────────────────────────────────
# Tune these without rebuilding the container — just restart the service.
vlm_settings:
  endpoint: "http://ovms-vlm:8001"
  model_name: "Qwen/Qwen2.5-VL-7B-Instruct"
  enabled: true
  timeout: 300.0
  max_tokens: 50
  temperature: 0.1
  max_image_size: 256
  max_concurrency: 1

patterns:
  shelf_to_waist:
    description: "Hand moves from shelf level to waist/pocket area"
    enabled: true
    alert_type: CONCEALMENT

    pose:
      per_side: true
      phases:
        - name: hand_raised
          min_frames: 3
          conditions:
            - subject: wrist
              relation: above
              reference: waist_midpoint
            - subject: wrist
              relation: not_near
              reference: nose
              threshold: 0.5

        - name: hand_to_conceal_zone
          min_frames: 3
          match: any
          conditions:
            - subject: wrist
              relation: near
              reference: waist_midpoint
              threshold: 0.6
            - subject: wrist
              relation: near
              reference: torso_center
              threshold: 0.5

    vlm:
      enabled: true
      num_frames: 4
      prompt: |
        Analyze 4 sequential CCTV frames of one shopper for CONCEALMENT.
        Suspicious=true if: hand reaches toward shelf then moves toward waist/pocket/bag/clothing in a concealing motion.
        Suspicious=false if: just browsing, using cart/basket, adjusting own belongings, walking normally.
        Output JSON only:
        {"suspicious":true|false,"confidence":0.0-1.0,"reasoning":"one sentence"}
      response_fields:
        - suspicious
        - confidence
        - reasoning

  loitering:
    description: "Person remains stationary in a restricted area for too long"
    enabled: false
    alert_type: LOITERING

    pose:
      per_side: false
      window_size: 15
      phases:
        - name: stationary
          min_frames: 15
          conditions:
            - subject: left_hip
              relation: stationary
              threshold: 0.05

    vlm:
      enabled: true
      num_frames: 4
      prompt: |
        Analyze these sequential frames of a person in a store.

        Determine if the person appears to be loitering:
        - Are they standing idle in one place for an extended period?
        - Do they appear to be waiting without a clear purpose?
        - Are they near high-value merchandise or restricted areas?

        Respond ONLY with valid JSON in this exact format:
        {
          "suspicious": true or false,
          "confidence": 0.0 to 1.0,
          "reasoning": "brief description of what you observe"
        }
      response_fields:
        - suspicious
        - confidence
        - reasoning
