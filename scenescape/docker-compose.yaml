# Full-stack deployment: SceneScape (pre-built images) + Storewide Loss Prevention
#
# All SceneScape services run from Docker Hub images — no source checkout needed.
#
# Quick start:
#   1. ./scenescape/scripts/init.sh                    # generate secrets, download videos
#   2. docker compose -f docker/docker-compose.full.yaml up -d
#
# Or use the Makefile:
#   make demo

name: storewide-lp

networks:
  storewide-lp:
    name: storewide-lp

secrets:
  root-cert:
    file: ${SECRETSDIR}/certs/scenescape-ca.pem
  web-cert:
    file: ${SECRETSDIR}/certs/scenescape-web.crt
  web-key:
    file: ${SECRETSDIR}/certs/scenescape-web.key
  vdms-client-cert:
    file: ${SECRETSDIR}/certs/scenescape-vdms-c.crt
  vdms-client-key:
    file: ${SECRETSDIR}/certs/scenescape-vdms-c.key
  vdms-server-cert:
    file: ${SECRETSDIR}/certs/scenescape-vdms-s.crt
  vdms-server-key:
    file: ${SECRETSDIR}/certs/scenescape-vdms-s.key
  controller.auth:
    environment: CONTROLLER_AUTH
  browser.auth:
    file: ${SECRETSDIR}/browser.auth
  calibration.auth:
    file: ${SECRETSDIR}/calibration.auth

# =========================================================================
#  SceneScape Core Services (pre-built images from Docker Hub / registry)
# =========================================================================

services:

  # ---- NTP Server ----
  ntpserv:
    image: dockurr/chrony:4.8
    networks:
      storewide-lp:
    restart: unless-stopped
    pids_limit: 1000

  # ---- MQTT Broker ----
  broker:
    image: eclipse-mosquitto:2.0.22
    ports:
      - "1883:1883"
      - "1884:1884"
      - "9001:9001"
    configs:
      - source: mosquitto-secure
        target: /mosquitto/config/mosquitto.conf
    volumes:
      - ${SECRETSDIR}:/mosquitto/secrets
    networks:
      storewide-lp:
        aliases:
          - broker.scenescape.intel.com
    user: "${UID:-1000}:${GID:-1000}"
    restart: always
    pids_limit: 1000

  # ---- PostgreSQL Database ----
  pgserver:
    image: postgres:17.6
    environment:
      POSTGRES_USER: scenescape
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: scenescape
    networks:
      - storewide-lp
    volumes:
      - vol-db:/var/lib/postgresql/data
    # ports:
    #   - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost -p 5432"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s

  # ---- SceneScape Web / Manager ----
  web:
    image: ${SCENESCAPE_REGISTRY:-}${SCENESCAPE_MANAGER_IMAGE:-intel/scenescape-manager}:${SCENESCAPE_VERSION:-v2026.0.0}
    init: true
    networks:
      storewide-lp:
        aliases:
          - web.scenescape.intel.com
    depends_on:
      pgserver:
        condition: service_healthy
      broker:
        condition: service_started
    ports:
      - "8443:443"
    command: >
      webserver
      --dbhost pgserver
      --dbtype postgres
      --dbport 5432
      --broker broker.scenescape.intel.com
      --brokerauth /run/secrets/browser.auth
      --brokerrootcert /run/secrets/certs/scenescape-ca.pem
    healthcheck:
      test: "curl --insecure -X GET https://web.scenescape.intel.com:443/api/v1/database-ready | grep 'true'"
      interval: 10s
      timeout: 120s
      retries: 10
      start_period: 10s
    environment:
      - SUPASS=${SUPASS}
      - DBHOST=pgserver
      - DBPORT=5432
      - no_proxy=${no_proxy},.scenescape.intel.com
      - NO_PROXY=${NO_PROXY},.scenescape.intel.com
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
    volumes:
      - vol-media:/workspace/media
      - vol-sample-data:/home/scenescape/SceneScape/sample_data
      - vol-migrations:/workspace/migrations
      - ${SECRETSDIR}/django:/run/secrets/django
    secrets:
      - source: root-cert
        target: certs/scenescape-ca.pem
      - source: web-cert
        target: certs/scenescape-web.crt
      - source: web-key
        target: certs/scenescape-web.key
      - controller.auth
      - browser.auth
    restart: always
    pids_limit: 1000

  # ---- Scene Import (imports .zip scene via REST API after web is ready) ----
  scene-import:
    image: python:3.12-slim
    networks:
      - storewide-lp
    depends_on:
      web:
        condition: service_healthy
    environment:
      - SCENE_NAME=${SCENE_NAME:-}
      - SCENE_ZIP=${SCENE_ZIP:-}
      - SCENESCAPE_URL=https://web.scenescape.intel.com
      - SCENESCAPE_USER=admin
      - SUPASS=${SUPASS}
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - no_proxy=${no_proxy:-},web.scenescape.intel.com,localhost,127.0.0.1
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-},web.scenescape.intel.com,localhost,127.0.0.1
    volumes:
      - ../scenescape/webserver:/webserver:ro
    secrets:
      - source: root-cert
        target: certs/scenescape-ca.pem
    entrypoint: ["/bin/bash", "/webserver/scene-import.sh"]
    restart: "no"

  # ---- SceneScape Controller (tracking + analytics) ----
  scene:
    image: ${SCENESCAPE_REGISTRY:-}${SCENESCAPE_CONTROLLER_IMAGE:-intel/scenescape-controller}:${SCENESCAPE_VERSION:-v2026.0.0}
    init: true
    user: "${UID:-1000}:${GID:-1000}"
    networks:
      storewide-lp:
    depends_on:
      web:
        condition: service_healthy
      broker:
        condition: service_started
      ntpserv:
        condition: service_started
    environment:
      CONTROLLER_ENABLE_METRICS: "false"
      CONTROLLER_METRICS_ENDPOINT: ""
      CONTROLLER_METRICS_EXPORT_INTERVAL_S: "60"
      CONTROLLER_ENABLE_TRACING: "false"
      CONTROLLER_TRACING_ENDPOINT: ""
      CONTROLLER_TRACING_SAMPLE_RATIO: "1.0"
      DEFAULT_MINIMUM_FEATURE_COUNT: 1
      no_proxy: ${no_proxy},.scenescape.intel.com
      NO_PROXY: ${NO_PROXY},.scenescape.intel.com
    command: >
      --restauth /run/secrets/controller.auth
      --brokerauth /run/secrets/controller.auth
      --broker broker.scenescape.intel.com
      --ntp ntpserv
    configs:
      - source: tracker-config
        target: /home/scenescape/SceneScape/tracker-config.json
      - source: reid-config
        target: /home/scenescape/SceneScape/reid-config.json
    volumes:
      - vol-media:/home/scenescape/SceneScape/media
      - vol-sample-data:/home/scenescape/SceneScape/sample_data
      - ${SECRETSDIR}/django:/run/secrets/django
    secrets:
      - source: root-cert
        target: certs/scenescape-ca.pem
      - controller.auth
      - source: vdms-client-key
        target: certs/scenescape-vdms-c.key
      - source: vdms-client-cert
        target: certs/scenescape-vdms-c.crt
    restart: always
    pids_limit: 1000

  # ---- VDMS (Visual Data Management System for ReID) ----
  vdms:
    image: intellabs/vdms:v2.12.0
    init: true
    networks:
      storewide-lp:
        aliases:
          - vdms.scenescape.intel.com
    environment:
      - OVERRIDE_ca_file=/run/secrets/certs/scenescape-ca.pem
      - OVERRIDE_cert_file=/run/secrets/certs/scenescape-vdms-s.crt
      - OVERRIDE_key_file=/run/secrets/certs/scenescape-vdms-s.key
    secrets:
      - source: root-cert
        target: certs/scenescape-ca.pem
      - source: vdms-server-cert
        target: certs/scenescape-vdms-s.crt
      - source: vdms-server-key
        target: certs/scenescape-vdms-s.key
    restart: always
    pids_limit: 1000

  # ---- RTSP Media Server ----
  mediaserver:
    image: bluenviron/mediamtx:1.14.0
    ports:
      - "8554:8554"
    networks:
      storewide-lp:
        aliases:
          - mediaserver
    restart: always
    pids_limit: 1000

  # ---- RTSP Camera Streams (retail videos) ----
  lp-cams:
    image: linuxserver/ffmpeg:version-8.0-cli
    command: >
      -nostdin -re -stream_loop -1 -i /workspace/media/${VIDEO_FILE:-Camera_01.mp4}
      -c:v copy -an
      -f rtsp -rtsp_transport tcp rtsp://mediaserver:8554/${CAMERA_NAME:-Camera_01}
    volumes:
      - vol-sample-data:/workspace/media
    networks:
      storewide-lp:
    depends_on:
      - mediaserver
    restart: always
    pids_limit: 1000

  lp-cams-2:
    image: linuxserver/ffmpeg:version-8.0-cli
    command: >
      -nostdin -re -stream_loop -1 -i /workspace/media/${VIDEO_FILE_2:-Camera_02.mp4}
      -c:v copy -an
      -f rtsp -rtsp_transport tcp rtsp://mediaserver:8554/${CAMERA_NAME_2:-Camera_02}
    volumes:
      - vol-sample-data:/workspace/media
    networks:
      storewide-lp:
    depends_on:
      - mediaserver
    restart: always
    pids_limit: 1000

  # ---- DLStreamer Pipeline Server (inference + MQTT publishing) ----
  lp-video:
    image: docker.io/intel/dlstreamer-pipeline-server:${DLSTREAMER_VERSION:-2026.1.0-20260331-weekly-ubuntu24}
    networks:
      storewide-lp:
    tty: true
    entrypoint: ["./run.sh"]
    # Uncomment to use GPU acceleration:
    # devices:
    #   - "/dev/dri:/dev/dri"
    # Uncomment to use NPU acceleration:
    # devices:
    #   - "/dev/accel:/dev/accel"
    group_add:
      - "109"
      - "110"
      - "992"
    device_cgroup_rules:
      - "c 189:* rmw"
      - "c 209:* rmw"
      - "a 189:* rwm"
    depends_on:
      broker:
        condition: service_started
      ntpserv:
        condition: service_started
      lp-cams:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-I", "-s", "http://localhost:8080/pipelines"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      - RUN_MODE=EVA
      - GENICAM=Balluff
      - GST_DEBUG=1,gencamsrc:2
      - ADD_UTCTIME_TO_METADATA=true
      - APPEND_PIPELINE_NAME_TO_PUBLISHER_TOPIC=false
      - MQTT_HOST=broker.scenescape.intel.com
      - MQTT_PORT=1883
      - REST_SERVER_PORT=8080
      - HTTPS_PROXY=${HTTPS_PROXY}
      - https_proxy=${https_proxy}
      - HTTP_PROXY=${HTTP_PROXY}
      - http_proxy=${http_proxy}
      - NO_PROXY=mediaserver,${NO_PROXY}
      - no_proxy=mediaserver,${no_proxy}
    configs:
      - source: lp-config
        target: /home/pipeline-server/config.json
    volumes:
      - ../scenescape/dlstreamer-pipeline-server/user_scripts:/home/pipeline-server/user_scripts
      - vol-dlstreamer-pipeline-root:/var/cache/pipeline_root:uid=1999,gid=1999
      - vol-sample-data:/home/pipeline-server/videos
      - vol-models:/home/pipeline-server/models
    secrets:
      - source: root-cert
        target: certs/scenescape-ca.pem
    restart: always
    pids_limit: 1000

  # ---- DLStreamer Pipeline Server — Camera 02 ----
  lp-video-2:
    image: docker.io/intel/dlstreamer-pipeline-server:${DLSTREAMER_VERSION:-2026.1.0-20260331-weekly-ubuntu24}
    networks:
      storewide-lp:
    tty: true
    entrypoint: ["./run.sh"]
    group_add:
      - "109"
      - "110"
      - "992"
    device_cgroup_rules:
      - "c 189:* rmw"
      - "c 209:* rmw"
      - "a 189:* rwm"
    depends_on:
      broker:
        condition: service_started
      ntpserv:
        condition: service_started
      lp-cams-2:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-I", "-s", "http://localhost:8080/pipelines"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      - RUN_MODE=EVA
      - GENICAM=Balluff
      - GST_DEBUG=1,gencamsrc:2
      - ADD_UTCTIME_TO_METADATA=true
      - APPEND_PIPELINE_NAME_TO_PUBLISHER_TOPIC=false
      - MQTT_HOST=broker.scenescape.intel.com
      - MQTT_PORT=1883
      - REST_SERVER_PORT=8080
      - HTTPS_PROXY=${HTTPS_PROXY}
      - https_proxy=${https_proxy}
      - HTTP_PROXY=${HTTP_PROXY}
      - http_proxy=${http_proxy}
      - NO_PROXY=mediaserver,${NO_PROXY}
      - no_proxy=mediaserver,${no_proxy}
    configs:
      - source: lp-config-2
        target: /home/pipeline-server/config.json
    volumes:
      - ../scenescape/dlstreamer-pipeline-server/user_scripts:/home/pipeline-server/user_scripts
      - vol-dlstreamer-pipeline-root-2:/var/cache/pipeline_root:uid=1999,gid=1999
      - vol-sample-data:/home/pipeline-server/videos
      - vol-models:/home/pipeline-server/models
    secrets:
      - source: root-cert
        target: certs/scenescape-ca.pem
    restart: always
    pids_limit: 1000

# =========================================================================
#  Configs (bind-mounted JSON files)
# =========================================================================
configs:
  mosquitto-secure:
    file: ../scenescape/mosquitto/mosquitto-secure.conf
  tracker-config:
    file: ../scenescape/controller/tracker-config.json
  tracker-config-time-chunking:
    file: ../scenescape/controller/tracker-config-time-chunking.json
  reid-config:
    file: ../scenescape/controller/reid-config.json
  lp-config:
    file: ${PIPELINE_CONFIG:-../scenescape/dlstreamer-pipeline-server/config.json}
  lp-config-2:
    file: ${PIPELINE_CONFIG_2:-../scenescape/dlstreamer-pipeline-server/config-camera2.json}

# =========================================================================
#  Volumes
# =========================================================================
volumes:
  vol-db:
  vol-media:
  vol-migrations:
  vol-sample-data:
  vol-models:
  vol-dlstreamer-pipeline-root:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  vol-dlstreamer-pipeline-root-2:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  seaweedfs-data:
