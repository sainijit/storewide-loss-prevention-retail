name: "Copilot Setup Steps"

on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install system dependencies for OpenCV and OpenVINO
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0 libgomp1

            - name: Set up Python 3.12
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
                  cache: "pip"
                  cache-dependency-path: |
                      person-of-interest/backend/requirements.txt
                      person-of-interest/mcp_server/requirements.txt

            - name: Install POI backend dependencies
              run: pip install -r person-of-interest/backend/requirements.txt

            - name: Install MCP server dependencies
              run: pip install -r person-of-interest/mcp_server/requirements.txt

            - name: Set up Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: person-of-interest/ui/package-lock.json

            - name: Install UI dependencies
              working-directory: person-of-interest/ui
              run: npm ci
